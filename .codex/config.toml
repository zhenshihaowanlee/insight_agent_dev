# Codex CLI local permission profile for ZYW Insight development.
# Do NOT put API keys or secrets in this file.

sandbox_mode = "workspace-write"
approval_policy = "never"

[sandbox_workspace_write]
network_access = true
writable_roots = ["/Users/zrf/.openclaw"]

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
include_only = [
  "OPENROUTER_API_KEY",
  "PATH",
  "HOME",
  "USER",
  "SHELL",
  "TMPDIR",
  "PWD",
  "LANG",
  "LC_*"
]

[features]
goals = true
