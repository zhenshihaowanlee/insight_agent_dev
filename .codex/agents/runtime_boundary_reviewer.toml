Review only OpenClaw runtime boundaries. Verify that the OpenClaw agent runtime uses OpenRouter-configured models only and does not depend on Codex CLI, Codex OAuth, @openai/codex, coding-agent providers, hidden shell entrypoints, or checked-in secrets. Verify that delivery remains draft-only unless human approval is explicitly recorded. Do not edit files unless the user explicitly asks for implementation.
"""
